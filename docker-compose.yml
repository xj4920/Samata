x-samata-build: &samata-build
  context: ..
  dockerfile: samata/Dockerfile
  args:
    SAMATA_VERSION: ${SAMATA_VERSION:-unknown}
    SAMATA_COMMIT: ${SAMATA_COMMIT:-unknown}

services:
  otcclaw:
    build: *samata-build
    image: ${OTCCLAW_IMAGE_REPO:-${SAMATA_IMAGE_REPO:-otcclaw}}:${OTCCLAW_IMAGE_TAG:-${SAMATA_IMAGE_TAG:-latest}}
    container_name: otcclaw
    restart: unless-stopped
    dns:
      - 10.55.66.66
      - 10.80.66.66
      - 8.8.8.8
    environment:
      NODE_ENV: uat
      TZ: Asia/Chongqing
      CLI_API_HOST: 0.0.0.0
      CLI_API_PORT: 3457
      SAMATA_PLUGINS_DIR: /app/plugins,/app/work-plugins
      PROVIDER_SUMMARY: custom
      MODEL_SUMMARY: external-deepseek-v4-pro
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      HEDGE_RATIO_BOOTSTRAP_PYTHON: python3
    ports:
      - "3457:3457"
    volumes:
      - ${SAMATA_DEPLOY_ROOT:-/opt/samata}/.env:/app/samata/.env:ro
      - type: bind
        source: ${SAMATA_DEPLOY_ROOT:-/opt/samata}/mcp-servers.json
        target: /app/samata/config/mcp-servers.json
        read_only: true
        bind:
          create_host_path: false
      - ${SAMATA_DEPLOY_ROOT:-/opt/samata}/data:/app/samata/data
      - ${SAMATA_DEPLOY_ROOT:-/opt/samata}/logs:/app/samata/logs
      - ${SAMATA_DEPLOY_ROOT:-/opt/samata}/ssh:/home/node/.ssh:ro

  docs:
    build: *samata-build
    image: ${OTCCLAW_IMAGE_REPO:-${SAMATA_IMAGE_REPO:-otcclaw}}:${OTCCLAW_IMAGE_TAG:-${SAMATA_IMAGE_TAG:-latest}}
    container_name: otcclaw-docs
    profiles:
      - docs
    command: ["npm", "run", "docs:dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
