x-samata-build: &samata-build
  context: ..
  dockerfile: samata/Dockerfile
  args:
    SAMATA_VERSION: ${SAMATA_VERSION:-unknown}
    SAMATA_COMMIT: ${SAMATA_COMMIT:-unknown}

services:
  samata:
    build: *samata-build
    image: ${SAMATA_IMAGE_REPO:-samata}:${SAMATA_IMAGE_TAG:-latest}
    container_name: samata
    restart: unless-stopped
    dns:
      - 10.55.66.66
      - 10.80.66.66
      - 8.8.8.8
    environment:
      NODE_ENV: uat
      TZ: Asia/Chongqing
      CLI_API_HOST: 0.0.0.0
      CLI_API_PORT: 3457
      SAMATA_PLUGINS_DIR: /app/plugins,/app/work-plugins
      PG_WIND_HOST: wind_sync_pg
      PG_WIND_PORT: 5432
      FAST_TRADING_PG_HOST: wind_sync_pg
      FAST_TRADING_PG_PORT: 5432
      WIND_PG_HOST: wind_sync_pg
      WIND_PG_PORT: 5432
      LOG_PG_HOST: wind_sync_pg
      LOG_PG_PORT: 5432
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      HEDGE_RATIO_BOOTSTRAP_PYTHON: python3
    ports:
      - "3457:3457"
    volumes:
      - ./.env:/app/samata/.env:ro
      - ./data:/app/samata/data
      - ./logs:/app/samata/logs
    networks:
      - default
      - wind-sync

  docs:
    build: *samata-build
    image: ${SAMATA_IMAGE_REPO:-samata}:${SAMATA_IMAGE_TAG:-latest}
    container_name: samata-docs
    profiles:
      - docs
    command: ["npm", "run", "docs:dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"

networks:
  wind-sync:
    external: true
    name: samata-wind-sync
